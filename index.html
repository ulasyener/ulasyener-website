<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ulaş Yener</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0a; overflow: hidden; }

        canvas#noise {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            opacity: 0.07;
            z-index: 1;
        }

        canvas#three {
            position: fixed;
            top: 0; left: 0;
            z-index: 0;
        }

        #overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            z-index: 2;
        }

        #name {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-size: 48px;
            font-weight: 100;
            letter-spacing: 0.4em;
            color: white;
            opacity: 0;
            animation: fadeIn 2s ease 0.5s forwards;
        }

        #title {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-size: 11px;
            letter-spacing: 0.4em;
            color: rgba(255,255,255,0.35);
            margin-top: 16px;
            opacity: 0;
            animation: fadeIn 2s ease 1.5s forwards;
            text-transform: uppercase;
        }

        #menu {
            display: flex;
            flex-direction: row;
            gap: 48px;
            margin-top: 48px;
            opacity: 0;
            animation: fadeIn 2s ease 3s forwards;
            pointer-events: all;
        }

        #menu a {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-size: 11px;
            letter-spacing: 0.35em;
            color: rgba(255,255,255,0.4);
            text-decoration: none;
            text-transform: uppercase;
            transition: color 0.3s;
            cursor: pointer;
        }

        #menu a:hover { color: white; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <canvas id="three"></canvas>
    <canvas id="noise"></canvas>

    <div id="overlay">
        <div id="name">ULAŞ YENER</div>
        <div id="title">Architect · Media Artist · PhD Researcher</div>
        <div id="menu">
            <a>Works</a>
            <a>About</a>
            <a>Contact</a>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // --- THREE.JS ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
        const renderer = new THREE.WebGLRenderer({ 
            canvas: document.getElementById('three'),
            antialias: true 
        });
        
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x0a0a0a);

        // Parçacıklar
        const geometry = new THREE.BufferGeometry();
        const count = 1500;
        const positions = new Float32Array(count * 3);

        for (let i = 0; i < count * 3; i++) {
            positions[i] = (Math.random() - 0.5) * 1500;
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

        const material = new THREE.PointsMaterial({
            color: 0xffffff,
            size: 0.8,
            transparent: true,
            opacity: 0.3
        });

        const particles = new THREE.Points(geometry, material);
        scene.add(particles);

        camera.position.z = 5;

        let mouseX = 0;
        let mouseY = 0;

        document.addEventListener('mousemove', (e) => {
            mouseX = (e.clientX / window.innerWidth - 0.5) * 2;
            mouseY = (e.clientY / window.innerHeight - 0.5) * 2;
        });

        function animateThree() {
            requestAnimationFrame(animateThree);
            camera.rotation.y += (mouseX * 0.15 - camera.rotation.y) * 0.03;
            camera.rotation.x += (-mouseY * 0.1 - camera.rotation.x) * 0.03;
            camera.position.z -= 0.03;
            if (camera.position.z < -500) camera.position.z = 5;
            renderer.render(scene, camera);
        }

        animateThree();

        // --- NOISE ---
        const noiseCanvas = document.getElementById('noise');
        const ctx = noiseCanvas.getContext('2d');

        noiseCanvas.width = window.innerWidth;
        noiseCanvas.height = window.innerHeight;

        function generateNoise() {
            const imageData = ctx.createImageData(noiseCanvas.width, noiseCanvas.height);
            const data = imageData.data;
            for (let i = 0; i < data.length; i += 4) {
                const v = Math.random() * 255;
                data[i] = v;
                data[i+1] = v;
                data[i+2] = v;
                data[i+3] = 255;
            }
            ctx.putImageData(imageData, 0, 0);
        }

        function animateNoise() {
            generateNoise();
            requestAnimationFrame(animateNoise);
        }

        animateNoise();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            noiseCanvas.width = window.innerWidth;
            noiseCanvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
